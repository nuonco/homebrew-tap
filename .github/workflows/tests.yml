name: brew test-bot
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test-bot:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04, macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    env:
      # The GitHub Actions runners enable the Homebrew Linux sandbox but do not
      # ship the `bwrap` (Bubblewrap) executable it requires, which makes
      # `brew doctor` (run by `brew test-bot --only-setup`) fail. Disable the
      # Linux sandbox to work around it. No-op on macOS runners.
      HOMEBREW_NO_SANDBOX_LINUX: 1
      # Homebrew 6's build sandbox cannot read ~/.homebrew/trust.json, so
      # source builds from third-party taps fail even when trusted
      # (https://github.com/Homebrew/brew/issues/22699). Remove once the
      # upstream fix (Homebrew/brew#22700) ships.
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

        # - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: "*.bottle.*"

  # On every `auto-merge` PR (opened by the generate workflow) report the
  # `brew test-bot` outcome: emit a Datadog counter tagged with the status so
  # we can track the formula auto-merge success rate, and alert #promotions on
  # failure (GitHub native auto-merge never fires when test-bot fails, so the
  # PR would otherwise sit open unmerged with no signal). Mirrors how
  # nuonco/mono and nuonco/nuon instrument promotions.
  report-auto-merge:
    name: Report auto-merge result to #promotions + datadog
    needs: test-bot
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    runs-on: ubuntu-latest
    steps:
      - name: Determine status and version
        id: check
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "status=${{ needs.test-bot.result }}" >> "$GITHUB_OUTPUT"
          # generate.yml names the branch `nuonbot/generate-<version>`
          echo "version=${HEAD_REF#nuonbot/generate-}" >> "$GITHUB_OUTPUT"

      - name: Slack Notification
        if: steps.check.outputs.status == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_ICON_EMOJI: 🤖
          SLACK_USERNAME: github-bot
          SLACK_WEBHOOK: ${{ secrets.PROMOTIONS_SLACK_WEBHOOK_URL }}
          SLACK_COLOR: failure
          SLACK_TITLE: homebrew-tap auto-merge failed
          SLACK_MESSAGE: |
            🚨🚨 auto-merge PR failed `brew test-bot` and will not merge
            *repo* - ${{ github.repository }}
            *pr* - <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}>
            *branch* - `${{ github.head_ref }}`

      - name: Update datadog
        uses: masci/datadog@v2
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          api-url: "https://us5.datadoghq.com"
          metrics: |
            - type: "count"
              name: "promotions.count"
              value: 1.0
              host: ${{ github.repository_owner }}
              tags:
                - "branch:${{ github.head_ref }}"
                - "status:${{ steps.check.outputs.status }}"
                - "version:${{ steps.check.outputs.version }}"
                - "type:homebrew-tap"
                - "repo:${{ github.event.repository.name }}"
